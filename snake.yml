# .github/workflows/snake.yml
# Generates the snake-eating-contributions SVG and pushes it to the `output` branch.
# The README references: raw.githubusercontent.com/KuantumKnight/KuantumKnight/output/github-snake-dark.svg
name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
  workflow_dispatch:          # lets you run it manually from the Actions tab
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=00FF9C&color_dots=0a0e0a,063a26,0a7d4f,0fbd6e,00FF9C

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
