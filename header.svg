<svg xmlns="http://www.w3.org/2000/svg" width="840" height="380" viewBox="0 0 840 380" fill="none" role="img" aria-label="Sarvesh M — Security, Systems, Full-Stack">
  <defs>
    <!-- neon glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e0a"/>
      <stop offset="1" stop-color="#070b07"/>
    </linearGradient>
    <clipPath id="screen"><rect x="14" y="52" width="812" height="314" rx="6"/></clipPath>
    <style>
      text { font-family: 'JetBrains Mono','Fira Code',ui-monospace,Menlo,Consolas,monospace; }
      .reveal { clip-path: inset(0 100% 0 0); }
      .prompt { fill: #00ff9c; }
      .arg    { fill: #c9d1d9; }
      .ok     { fill: #9FEF00; }
      .dim    { fill: #5a6b5a; }

      @keyframes type { to { clip-path: inset(0 0 0 0); } }
      @keyframes blink { 0%,49% { opacity: 1 } 50%,100% { opacity: 0 } }
      @keyframes scan  { from { transform: translateY(-40px) } to { transform: translateY(340px) } }

      .l1 { animation: type .5s steps(18)  forwards .30s; }
      .l2 { animation: type .4s steps(26)  forwards .85s; }
      .l3 { animation: type .5s steps(14)  forwards 1.35s; }
      .l4 { animation: type .7s steps(40)  forwards 1.95s; }
      .l5 { animation: type .5s steps(14)  forwards 2.80s; }
      .l6 { animation: type .7s steps(34)  forwards 3.40s; }
      .l7 { animation: type .5s steps(16)  forwards 4.20s; }
      .l8 { animation: type .6s steps(30)  forwards 4.80s; }
      .l9 { animation: type .4s steps(11)  forwards 5.55s; }
      .cursor { fill: #00ff9c; animation: blink 1s steps(1) infinite 6s; }
      .scanline { opacity: .05; animation: scan 5s linear infinite; }
    </style>
  </defs>

  <!-- window -->
  <rect x="2" y="2" width="836" height="376" rx="10" fill="url(#bg)" stroke="#00ff9c" stroke-opacity="0.28"/>
  <!-- title bar -->
  <rect x="2" y="2" width="836" height="38" rx="10" fill="#0d120d"/>
  <rect x="2" y="22" width="836" height="18" fill="#0d120d"/>
  <circle cx="26" cy="21" r="6" fill="#ff5f56" fill-opacity="0.85"/>
  <circle cx="48" cy="21" r="6" fill="#ffbd2e" fill-opacity="0.85"/>
  <circle cx="70" cy="21" r="6" fill="#27c93f" fill-opacity="0.9"/>
  <text x="420" y="26" text-anchor="middle" font-size="13" class="dim">sarvesh@github — zsh — 84×24</text>

  <!-- terminal body -->
  <g clip-path="url(#screen)" font-size="17">
    <!-- scanline sweep -->
    <rect class="scanline" x="14" y="52" width="812" height="26" fill="#00ff9c"/>

    <text x="34" y="84"  class="reveal l1"><tspan class="prompt">$</tspan> <tspan class="arg">ssh sarvesh@github</tspan></text>
    <text x="34" y="112" class="reveal l2"><tspan class="ok">[ok]</tspan> <tspan class="dim">authenticated · connection established</tspan></text>

    <text x="34" y="148" class="reveal l3"><tspan class="prompt">$</tspan> <tspan class="arg">whoami</tspan></text>
    <text x="34" y="176" class="reveal l4" filter="url(#glow)"><tspan class="ok">Sarvesh M</tspan> <tspan class="dim">· VIT Chennai · Chennai, IN</tspan></text>

    <text x="34" y="212" class="reveal l5"><tspan class="prompt">$</tspan> <tspan class="arg">cat ./focus</tspan></text>
    <text x="34" y="240" class="reveal l6"><tspan class="arg">security</tspan> <tspan class="dim">·</tspan> <tspan class="arg">systems</tspan> <tspan class="dim">·</tspan> <tspan class="arg">full-stack</tspan></text>

    <text x="34" y="276" class="reveal l7"><tspan class="prompt">$</tspan> <tspan class="arg">ls ./stack</tspan></text>
    <text x="34" y="304" class="reveal l8"><tspan class="ok">offensive-sec</tspan>  <tspan class="ok">C/WASM</tspan>  <tspan class="ok">next.js+ts</tspan>  <tspan class="ok">python</tspan></text>

    <text x="34" y="340" class="reveal l9"><tspan class="prompt">$</tspan> <tspan class="arg">./connect</tspan></text>
    <rect class="cursor" x="138" y="327" width="10" height="17"/>
  </g>
</svg>
