<svg xmlns="http://www.w3.org/2000/svg" width="860" height="368" viewBox="0 0 860 368" role="img" aria-label="terminal hero: Sarvesh M, builds things then breaks them">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feComponentTransfer in="b" result="b2"><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode in="b2"/></feMerge>
    </filter>
    <pattern id="scan" width="3" height="4" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" y="0" fill="#00ff9c" opacity="0.04"/>
    </pattern>
    <linearGradient id="beamg" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#00ff9c" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00ff9c" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#00ff9c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vign" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#00ff9c" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#0a0e0d" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- panel -->
  <rect x="1" y="1" width="858" height="366" rx="12" fill="#0a0e0d" stroke="#16241e" stroke-width="1.5"/>
  <rect x="1" y="1" width="858" height="120" rx="12" fill="url(#vign)"/>

  <!-- title bar -->
  <rect x="1" y="1" width="858" height="40" rx="12" fill="#0d1411"/>
  <rect x="1" y="28" width="858" height="13" fill="#0d1411"/>
  <line x1="1" y1="41" x2="859" y2="41" stroke="#16241e" stroke-width="1.5"/>
  <circle cx="24" cy="21" r="6" fill="#ff5f56" opacity="0.85"/>
  <circle cx="44" cy="21" r="6" fill="#febc2e" opacity="0.85"/>
  <circle cx="64" cy="21" r="6" fill="#27c93f" opacity="0.85"/>
  <text x="430" y="26" text-anchor="middle" font-family="'SFMono-Regular',ui-monospace,'JetBrains Mono','Fira Code','Cascadia Code',Consolas,'Liberation Mono',Menlo,monospace" font-size="13" fill="#5c6b64">knight@kali: ~/profile — zsh</text>

  <!-- scanlines -->
  <rect x="2" y="42" width="856" height="324" fill="url(#scan)"/>

  <!-- one-shot scan beam during boot -->
  <g opacity="0">
    <animateTransform attributeName="transform" type="translate" values="-80 0;860 0" dur="2.4s" begin="0.1s" fill="freeze"/>
    <animate attributeName="opacity" values="0;0.55;0.55;0" keyTimes="0;0.08;0.85;1" dur="2.4s" begin="0.1s" fill="freeze"/>
    <rect x="0" y="42" width="60" height="324" fill="url(#beamg)"/>
  </g>

  <!-- body -->
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.45s" begin="0.15s" fill="freeze"/><text x="30" y="88" font-size="17" font-weight="500" font-family="'SFMono-Regular',ui-monospace,'JetBrains Mono','Fira Code','Cascadia Code',Consolas,'Liberation Mono',Menlo,monospace"><tspan fill="#00ff9c" font-weight="700">knight@kali</tspan><tspan fill="#5c6b64">:</tspan><tspan fill="#5ef2ff">~</tspan><tspan fill="#5c6b64">$ </tspan><tspan fill="#e6f2ec">./whoami --proof</tspan></text></g><g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.45s" begin="0.55s" fill="freeze"/><text x="30" y="118" font-size="17" font-weight="500" font-family="'SFMono-Regular',ui-monospace,'JetBrains Mono','Fira Code','Cascadia Code',Consolas,'Liberation Mono',Menlo,monospace"><tspan fill="#5c6b64">[*] </tspan><tspan fill="#e6f2ec">resolving identity </tspan><tspan fill="#5c6b64">··········· </tspan><tspan fill="#00ff9c" font-weight="700">ok</tspan></text></g><g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.45s" begin="0.95s" fill="freeze"/><text x="30" y="148" font-size="17" font-weight="500" font-family="'SFMono-Regular',ui-monospace,'JetBrains Mono','Fira Code','Cascadia Code',Consolas,'Liberation Mono',Menlo,monospace"><tspan fill="#00ff9c">role  </tspan><tspan fill="#5c6b64"> : </tspan><tspan fill="#e6f2ec">security · systems · full-stack</tspan></text></g><g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.45s" begin="1.35s" fill="freeze"/><text x="30" y="178" font-size="17" font-weight="500" font-family="'SFMono-Regular',ui-monospace,'JetBrains Mono','Fira Code','Cascadia Code',Consolas,'Liberation Mono',Menlo,monospace"><tspan fill="#00ff9c">mode  </tspan><tspan fill="#5c6b64"> : </tspan><tspan fill="#e6f2ec">builds things, then breaks them</tspan></text></g><g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.45s" begin="1.75s" fill="freeze"/><text x="30" y="208" font-size="17" font-weight="500" font-family="'SFMono-Regular',ui-monospace,'JetBrains Mono','Fira Code','Cascadia Code',Consolas,'Liberation Mono',Menlo,monospace"><tspan fill="#00ff9c">proof </tspan><tspan fill="#5c6b64"> : </tspan><tspan fill="#e6f2ec">bugbouncer </tspan><tspan fill="#5ef2ff" font-weight="700">60★</tspan><tspan fill="#5c6b64">  ·  </tspan><tspan fill="#e6f2ec">ctf writeups</tspan><tspan fill="#5c6b64">  ·  </tspan><tspan fill="#e6f2ec">Synthetix</tspan></text></g><g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.45s" begin="2.15s" fill="freeze"/><text x="30" y="238" font-size="17" font-weight="500" font-family="'SFMono-Regular',ui-monospace,'JetBrains Mono','Fira Code','Cascadia Code',Consolas,'Liberation Mono',Menlo,monospace"><tspan fill="#00ff9c">[+] </tspan><tspan fill="#00ff9c" font-weight="700">access granted</tspan></text></g>
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.7s" fill="freeze"/><text x="30" y="314" font-size="40" font-weight="700" fill="#00ff9c" filter="url(#glow)" font-family="'SFMono-Regular',ui-monospace,'JetBrains Mono','Fira Code','Cascadia Code',Consolas,'Liberation Mono',Menlo,monospace">Sarvesh M</text><text x="30" y="314" font-size="40" font-weight="700" fill="#00ff9c" font-family="'SFMono-Regular',ui-monospace,'JetBrains Mono','Fira Code','Cascadia Code',Consolas,'Liberation Mono',Menlo,monospace">Sarvesh M<tspan fill="#00ff9c"> █<animate attributeName="fill-opacity" values="1;1;0;0" keyTimes="0;0.49;0.5;1" dur="1.05s" begin="3s" repeatCount="indefinite"/></tspan></text><text x="832" y="314" text-anchor="end" font-size="15" font-weight="500" fill="#5c6b64" font-family="'SFMono-Regular',ui-monospace,'JetBrains Mono','Fira Code','Cascadia Code',Consolas,'Liberation Mono',Menlo,monospace">//KuantumKnight · builds + breaks</text></g>
</svg>
